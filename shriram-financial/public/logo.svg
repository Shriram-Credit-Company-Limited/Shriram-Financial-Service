<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 40" fill="none">
  <!-- Emblem: stylised S-chevron in brand blue -->
  <g>
    <!-- Top bar -->
    <rect x="0" y="0" width="32" height="7" rx="1.5" fill="#0E52CB"/>
    <!-- Mid left notch -->
    <rect x="0" y="11" width="22" height="7" rx="1.5" fill="#0E52CB"/>
    <!-- Bottom bar -->
    <rect x="0" y="22" width="32" height="7" rx="1.5" fill="#0E52CB"/>
    <!-- Accent dot -->
    <rect x="24" y="11" width="8" height="7" rx="1.5" fill="#C9A227"/>
  </g>
  <!-- Wordmark -->
  <text x="42" y="22" font-family="'Plus Jakarta Sans','DM Sans',system-ui,sans-serif" font-size="17" font-weight="700" letter-spacing="-0.3" fill="#0E52CB">SHRIRAM</text>
  <text x="42" y="34" font-family="'Outfit','Inter',system-ui,sans-serif" font-size="8.5" font-weight="500" letter-spacing="2.5" fill="#666666">FINANCIAL</text>
</svg>
