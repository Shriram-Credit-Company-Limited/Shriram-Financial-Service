# ============================================================
#  Nginx config for Shriram Financial Services (static site)
#  Place at: /etc/nginx/sites-available/shriram
#  Then:     ln -s /etc/nginx/sites-available/shriram /etc/nginx/sites-enabled/
#            nginx -t && systemctl reload nginx
# ============================================================

server {
    listen 80;
    listen [::]:80;
    server_name shriramfinancialservices.com www.shriramfinancialservices.com;

    # After running certbot, it will manage the 443 block and redirect here.
    root /var/www/shriram;
    index index.html;

    # Clean URLs — serve /products/equity/ -> /products/equity/index.html
    location / {
        try_files $uri $uri/ $uri.html =404;
    }

    # Custom 404
    error_page 404 /404.html;

    # Cache static assets aggressively (Astro fingerprints filenames)
    location /_astro/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
    location ~* \.(?:css|js|woff2?|svg|png|jpg|jpeg|webp|ico)$ {
        expires 30d;
        add_header Cache-Control "public";
    }

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    gzip on;
    gzip_types text/css application/javascript image/svg+xml application/json;
    gzip_min_length 256;
}
