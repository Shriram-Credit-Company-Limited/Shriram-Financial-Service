# nginx vhost for the UAT subdomain.
# Install path: /etc/nginx/sites-available/dev.shriramfinancialservices.online
# (see deploy/uat/SETUP.md for the full one-time setup). Certbot will add the
# 443 listener + HTTP->HTTPS redirect when you run it.

server {
    listen 80;
    listen [::]:80;
    server_name dev.shriramfinancialservices.online;

    root /var/www/uat;
    index index.html;

    # UAT is a test environment — keep it out of search engines.
    add_header X-Robots-Tag "noindex, nofollow" always;

    # Astro builds with format:'directory', so /foo/ -> /foo/index.html.
    location / {
        try_files $uri $uri/ =404;
    }
}
